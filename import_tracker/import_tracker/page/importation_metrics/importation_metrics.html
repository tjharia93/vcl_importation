<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importation Metrics</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        body {
            background-color: #343a40;
            color: white;
        }
        .card {
            background-color: #495057;
            border: none;
        }
        h1, h2, .kpi {
            color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Importation Metrics Dashboard</h1>
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h2 class="kpi">KPI 1</h2>
                        <p>Value</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h2 class="kpi">KPI 2</h2>
                        <p>Value</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h2 class="kpi">KPI 3</h2>
                        <p>Value</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h2 class="kpi">KPI 4</h2>
                        <p>Value</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-5">
            <h2>Pipeline Chart</h2>
            <canvas id="pipelineChart"></canvas>
        </div>
        <div class="mt-5">
            <h2>Shipping Mode Distribution</h2>
            <canvas id="donutChart"></canvas>
        </div>
        <div class="mt-5">
            <h2>Shipments Table</h2>
            <table class="table table-dark">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Destination</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Location A</td>
                        <td>In Transit</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Location B</td>
                        <td>Delivered</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
    <script>
        var ctxPipeline = document.getElementById('pipelineChart').getContext('2d');
        var pipelineChart = new Chart(ctxPipeline, {
            type: 'line',
            data: {
                labels: ['January', 'February', 'March'],
                datasets: [{
                    label: 'Pipeline',
                    data: [10, 20, 15],
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)'
                }]
            }
        });

        var ctxDonut = document.getElementById('donutChart').getContext('2d');
        var donutChart = new Chart(ctxDonut, {
            type: 'doughnut',
            data: {
                labels: ['Air', 'Sea', 'Land'],
                datasets: [{
                    data: [20, 50, 30],
                    backgroundColor: ['#36A2EB', '#FF6384', '#FFCE56']
                }]
            }
        });
    </script>
</body>
</html>
